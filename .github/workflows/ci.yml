# This repository is PUBLIC. This workflow must never consume secrets, and must
# never use `pull_request_target` — that would expose secrets to fork PRs.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  quality-gate:
    name: quality-gate
    if: ${{ always() }}
    needs: [test]
    uses: ./.github/workflows/quality-gate.yml
    with:
      needs-json: ${{ toJSON(needs) }}
