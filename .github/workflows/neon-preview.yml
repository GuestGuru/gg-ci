# Reusable workflow: per-PR Neon preview branch + branch-scoped Vercel preview env.
#
# Every app-specific value is a required input — this repository is PUBLIC and must
# never contain GuestGuru infrastructure identifiers. Do NOT add default values.
name: Neon preview branch

on:
  workflow_call:
    inputs:
      command:
        description: "ensure | destroy | refresh-ttl | reset-shared"
        required: true
        type: string
      neon-project-id:
        description: "Neon project ID that owns both the parent branch and every preview branch this workflow creates/deletes (Neon console → project settings, or `neonctl projects list`)."
        required: true
        type: string
      parent-branch-id:
        description: "Neon branch ID that new preview branches are forked FROM — passed as parent_id when creating a PR branch, and as source_branch_id when resetting the shared branch. Typically the production branch's ID."
        required: true
        type: string
      role-name:
        description: "Name of an existing Neon Postgres role, combined with database-name to build the connection URI for each forked branch. Not created by this workflow — must already exist on the parent branch."
        required: true
        type: string
      database-name:
        description: "Name of an existing Neon database, combined with role-name to build the connection URI for each forked branch. Not created by this workflow — must already exist on the parent branch."
        required: true
        type: string
      vercel-project-id:
        description: "Vercel project ID that owns the preview deployments this workflow manages (Vercel project → Settings → General, or `vercel project ls`)."
        required: true
        type: string
      vercel-team-id:
        description: "Vercel team (organization) ID that owns the project above — required by the Vercel API alongside the project ID (team → Settings → General, or `vercel teams ls`)."
        required: true
        type: string
      branch-prefix:
        description: "Namespace for this app's preview branches. Each PR's Neon branch is named <branch-prefix>/pr-<number>; refresh-ttl only ever deletes branches under this prefix, so production, other long-lived branches, and other apps' previews sharing the Neon project are never touched."
        required: true
        type: string
      shared-branch-name:
        description: "Name of the long-lived fallback Neon branch that preview deployments point at before their own PR branch exists. The weekly reset-shared command resets this branch from parent-branch-id so it never drifts from production."
        required: true
        type: string
      env-var-name:
        description: "Vercel environment-variable key this workflow writes the forked branch's connection URI into (Preview scope, scoped to the PR's git branch). Must exactly match the key your application code reads for its database connection string (e.g. DATABASE_URL)."
        required: true
        type: string
      ttl-days:
        description: "Days a preview branch may live without being refreshed before Neon auto-expires it. ensure sets expires_at this far out when creating/reusing a branch; the daily refresh-ttl cron extends it again for every still-open PR."
        required: true
        type: number
      pr-number:
        description: "Required for ensure/destroy"
        required: false
        type: number
      git-branch:
        description: "Required for ensure/destroy — the PR head ref"
        required: false
        type: string
      open-pr-numbers:
        description: "Comma-separated open PR numbers. Only used when open-pr-numbers-known is true."
        required: false
        type: string
      open-pr-numbers-known:
        description: "true if the caller successfully determined the open PR list (even if empty). When false, cleanup is skipped."
        required: false
        type: boolean
        default: false
      dry-run:
        description: "Logs the actions that would be taken without calling the Neon or Vercel APIs."
        required: false
        type: boolean
        default: false
    secrets:
      NEON_API_KEY: { required: true }
      VERCEL_TOKEN: { required: true }

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          repository: GuestGuru/gg-ci
          ref: main

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - run: npm ci

      - name: Run neon-preview ${{ inputs.command }}
        shell: bash
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          COMMAND: ${{ inputs.command }}
          NEON_PROJECT_ID: ${{ inputs.neon-project-id }}
          PARENT_BRANCH_ID: ${{ inputs.parent-branch-id }}
          ROLE_NAME: ${{ inputs.role-name }}
          DATABASE_NAME: ${{ inputs.database-name }}
          VERCEL_PROJECT_ID: ${{ inputs.vercel-project-id }}
          VERCEL_TEAM_ID: ${{ inputs.vercel-team-id }}
          BRANCH_PREFIX: ${{ inputs.branch-prefix }}
          SHARED_BRANCH_NAME: ${{ inputs.shared-branch-name }}
          ENV_VAR_NAME: ${{ inputs.env-var-name }}
          TTL_DAYS: ${{ inputs.ttl-days }}
          PR_NUMBER: ${{ inputs.pr-number }}
          GIT_BRANCH: ${{ inputs.git-branch }}
          OPEN_PR_NUMBERS: ${{ inputs.open-pr-numbers }}
          OPEN_PR_NUMBERS_KNOWN: ${{ inputs.open-pr-numbers-known }}
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          args=(
            --neon-project-id="$NEON_PROJECT_ID"
            --parent-branch-id="$PARENT_BRANCH_ID"
            --role-name="$ROLE_NAME"
            --database-name="$DATABASE_NAME"
            --vercel-project-id="$VERCEL_PROJECT_ID"
            --vercel-team-id="$VERCEL_TEAM_ID"
            --branch-prefix="$BRANCH_PREFIX"
            --shared-branch-name="$SHARED_BRANCH_NAME"
            --env-var-name="$ENV_VAR_NAME"
            --ttl-days="$TTL_DAYS"
          )

          if [[ -n "$PR_NUMBER" ]]; then
            args+=(--pr-number="$PR_NUMBER")
          fi

          if [[ -n "$GIT_BRANCH" ]]; then
            args+=(--git-branch="$GIT_BRANCH")
          fi

          if [[ "$OPEN_PR_NUMBERS_KNOWN" == "true" ]]; then
            args+=(--open-pr-numbers="$OPEN_PR_NUMBERS")
          fi

          if [[ "$DRY_RUN" == "true" ]]; then
            args+=(--dry-run)
          fi

          npm run neon-preview -- "$COMMAND" "${args[@]}"
