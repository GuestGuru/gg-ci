# Reusable workflow: per-PR Neon preview branch + branch-scoped Vercel preview env.
#
# Every app-specific value is a required input — this repository is PUBLIC and must
# never contain GuestGuru infrastructure identifiers. Do NOT add default values.
name: Neon preview branch

on:
  workflow_call:
    inputs:
      command:
        description: "ensure | destroy | refresh-ttl | reset-shared"
        required: true
        type: string
      neon-project-id: { required: true, type: string }
      parent-branch-id: { required: true, type: string }
      role-name: { required: true, type: string }
      database-name: { required: true, type: string }
      vercel-project-id: { required: true, type: string }
      vercel-team-id: { required: true, type: string }
      branch-prefix: { required: true, type: string }
      shared-branch-name: { required: true, type: string }
      env-var-name: { required: true, type: string }
      ttl-days: { required: true, type: number }
      pr-number:
        description: "Required for ensure/destroy"
        required: false
        type: number
      git-branch:
        description: "Required for ensure/destroy — the PR head ref"
        required: false
        type: string
      open-pr-numbers:
        description: "Comma-separated open PR numbers. Only used when open-pr-numbers-known is true."
        required: false
        type: string
      open-pr-numbers-known:
        description: "true if the caller successfully determined the open PR list (even if empty). When false, cleanup is skipped."
        required: false
        type: boolean
        default: false
      dry-run:
        required: false
        type: boolean
        default: false
    secrets:
      NEON_API_KEY: { required: true }
      VERCEL_TOKEN: { required: true }

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          repository: GuestGuru/gg-ci
          ref: main

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - run: npm ci

      - name: Run neon-preview ${{ inputs.command }}
        shell: bash
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          COMMAND: ${{ inputs.command }}
          NEON_PROJECT_ID: ${{ inputs.neon-project-id }}
          PARENT_BRANCH_ID: ${{ inputs.parent-branch-id }}
          ROLE_NAME: ${{ inputs.role-name }}
          DATABASE_NAME: ${{ inputs.database-name }}
          VERCEL_PROJECT_ID: ${{ inputs.vercel-project-id }}
          VERCEL_TEAM_ID: ${{ inputs.vercel-team-id }}
          BRANCH_PREFIX: ${{ inputs.branch-prefix }}
          SHARED_BRANCH_NAME: ${{ inputs.shared-branch-name }}
          ENV_VAR_NAME: ${{ inputs.env-var-name }}
          TTL_DAYS: ${{ inputs.ttl-days }}
          PR_NUMBER: ${{ inputs.pr-number }}
          GIT_BRANCH: ${{ inputs.git-branch }}
          OPEN_PR_NUMBERS: ${{ inputs.open-pr-numbers }}
          OPEN_PR_NUMBERS_KNOWN: ${{ inputs.open-pr-numbers-known }}
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          args=(
            --neon-project-id="$NEON_PROJECT_ID"
            --parent-branch-id="$PARENT_BRANCH_ID"
            --role-name="$ROLE_NAME"
            --database-name="$DATABASE_NAME"
            --vercel-project-id="$VERCEL_PROJECT_ID"
            --vercel-team-id="$VERCEL_TEAM_ID"
            --branch-prefix="$BRANCH_PREFIX"
            --shared-branch-name="$SHARED_BRANCH_NAME"
            --env-var-name="$ENV_VAR_NAME"
            --ttl-days="$TTL_DAYS"
          )

          if [[ -n "$PR_NUMBER" ]]; then
            args+=(--pr-number="$PR_NUMBER")
          fi

          if [[ -n "$GIT_BRANCH" ]]; then
            args+=(--git-branch="$GIT_BRANCH")
          fi

          if [[ "$OPEN_PR_NUMBERS_KNOWN" == "true" ]]; then
            args+=(--open-pr-numbers="$OPEN_PR_NUMBERS")
          fi

          if [[ "$DRY_RUN" == "true" ]]; then
            args+=(--dry-run)
          fi

          npm run neon-preview -- "$COMMAND" "${args[@]}"
