# Organization rulesets run this workflow from gg-ci, outside the target pull
# request's control. It verifies that each repository still wires its real
# mandatory jobs into the canonical delivery gate.
name: Policy gate

on:
  pull_request:
  merge_group:

permissions:
  contents: read

jobs:
  workflow-policy:
    name: workflow-policy
    runs-on: ubuntu-latest
    steps:
      - name: Check out target repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          path: target

      - name: Check out trusted policy implementation
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .policy

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: .policy/package-lock.json

      - run: npm ci --ignore-scripts --prefix .policy --userconfig=/dev/null
      - run: node .policy/node_modules/tsx/dist/cli.mjs .policy/src/workflow-policy.ts "$GITHUB_WORKSPACE/target"
        env:
          NODE_OPTIONS: ""
